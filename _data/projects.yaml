- title: Exploring the role of epigenetic regulators in cellular responses to KRAS driven stress
  group: featured
  image: images/photo.jpg
  description: KRAS mutations occur in over 90% of PDAC tumors. These mutations are often early events observed in pre-malignant lesions, along with changes to nuclear shape and chromatin. Investigation into what drives these changes in epigenetic states may result in more effective personalized therapies.
  
